<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Resume Builder</title>
    <link rel="stylesheet" href="AIResumeBuilder.css" />
  </head>
  <body>
    <h1>AI Resume Builder</h1>

    <form id="resumeForm" class="option1">
      <p id="formError" class="error-msg"></p>
      <!-- Name -->
      <label for="name">Full Name</label>
      <input type="text" id="name" required />

      <!-- Email -->
      <label for="email">Email address</label>
      <input type="email" id="email" required />

      <!-- Education -->
      <label for="education">Education</label>
      <input type="text" id="education" required />

      <!-- Work Experience -->
      <label for="workExperience">Work Experience</label>
      <input type="text" id="workExperience" required />

      <!-- Skills -->
      <label for="skills">Skills</label>
      <input type="text" id="skills" required />

      <label for="design">Choose a design</label>
      <select id="design">
        <option value="option1">Classic White</option>
        <option value="option2">Classic White Blue</option>
      </select>
      <div class="form-buttons">
        <button type="submit">Build Resume</button>
      </div>
    </form>
    <div id="resume"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="AIResumeBuilder.js"></script>
  </body>
</html>
